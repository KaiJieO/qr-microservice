spring:
  application:
    name: qr-service
  datasource:
    url: jdbc:mysql://localhost:3306/qrcode_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: test123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
#  servlet:
#    server.servlet.context-path: /api

logging:
  level:
    com.qrcode: DEBUG
